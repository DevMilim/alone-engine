[package]
name = "alone-engine"
version = "0.1.0"
edition = "2024"

[workspace]
resolver = "3"
members = ["crates/*", "example"]

[dependencies]
engine_assets = { version = "0.1.0", path = "crates/engine_assets" }
engine_audio = { version = "0.1.0", path = "crates/engine_audio" }
engine_core = { version = "0.1.0", path = "crates/engine_core" }
engine_event = { version = "0.1.0", path = "crates/engine_event" }
engine_input = { version = "0.1.0", path = "crates/engine_input" }
engine_macros = { version = "0.1.0", path = "crates/engine_macros" }
engine_math = { version = "0.1.0", path = "crates/engine_math" }
engine_render = { version = "0.1.0", path = "crates/engine_render" }
engine_runtime = { version = "0.1.0", path = "crates/engine_runtime" }
